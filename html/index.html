 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Cobrinha</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* Telas do jogo */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .screen.active {
            display: flex;
        }

        /* Estilo do Tabuleiro */
        canvas {
            background-color: #111;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Botões */
        button {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.2s;
        }

        button:hover {
            background-color: #45a049;
        }

        button.restart-btn {
            background-color: #f44336;
        }
        button.restart-btn:hover {
            background-color: #da190b;
        }

        /* Placar */
        #score-board {
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- Tela do Menu Inicial -->
    <div id="menu-screen" class="screen active">
        <h1>Jogo da Cobrinha</h1>
        <p>Use as setas do teclado para jogar e comer as frutinhas!</p>
        <button onclick="startGame()">Jogar</button>
    </div>

    <!-- Tela do Jogo -->
    <div id="game-screen" class="screen">
        <div id="score-board">Pontos: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <!-- Tela de Game Over -->
    <div id="gameover-screen" class="screen">
        <h1>Game Over!</h1>
        <p>Você bateu.</p>
        <button class="restart-btn" onclick="startGame()">Jogar Novamente</button>
        <button onclick="showMenu()">Voltar ao Menu</button>
    </div>

    <script>
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Configurações do jogo
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize; // Velocidade inicial (andando para a direita)
        let dy = 0;
        let score = 0;
        let gameInterval;

        function showScreen(screenToShow) {
            [menuScreen, gameScreen, gameoverScreen].forEach(screen => {
                screen.classList.remove('active');
            });
            screenToShow.classList.add('active');
        }

        function startGame() {
            showScreen(gameScreen);
            
            // Cobra começa no meio
            snake = [
                { x: 160, y: 200 },
                { x: 140, y: 200 },
                { x: 120, y: 200 }
            ];
            
            score = 0;
            scoreElement.innerText = score;
            dx = gridSize;
            dy = 0;

            generateFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 100); // 100ms de velocidade
        }

        function showMenu() {
            showScreen(menuScreen);
        }

        function gameLoop() {
            moveSnake();
            if (checkGameOver()) {
                clearInterval(gameInterval);
                showScreen(gameoverScreen);
                return;
            }
            
            clearCanvas();
            drawFood();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // A cabeça da cobra é um verde diferente
                ctx.fillStyle = index === 0 ? '#4CAF50' : '#2c8a30';
                ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); // Adiciona a nova cabeça

            // Verifica se comeu a comida
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop(); // Remove a ponta da cauda
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;
        }

        function drawFood() {
            ctx.fillStyle = '#ff3333';
            ctx.fillRect(food.x, food.y, gridSize - 2, gridSize - 2);
        }

        function checkGameOver() {
            // Bateu na parede?
            if (snake[0].x < 0 || snake[0].x >= canvas.width || snake[0].y < 0 || snake[0].y >= canvas.height) {
                return true;
            }
            
            // Bateu no próprio corpo?
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    return true;
                }
            }
            return false;
        }

        // Controles do teclado
        document.addEventListener('keydown', (e) => {
            // Seta para a esquerda
            if (e.key === 'ArrowLeft' && dx === 0) {
                dx = -gridSize;
                dy = 0;
            }
            // Seta para cima
            if (e.key === 'ArrowUp' && dy === 0) {
                dx = 0;
                dy = -gridSize;
            }
            // Seta para a direita
            if (e.key === 'ArrowRight' && dx === 0) {
                dx = gridSize;
                dy = 0;
            }
            // Seta para baixo
            if (e.key === 'ArrowDown' && dy === 0) {
                dx = 0;
                dy = gridSize;
            }
        });
    </script>
</body>
</html>
