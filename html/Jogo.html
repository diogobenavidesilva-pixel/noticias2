<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedra, Papel ou Tesoura</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #ffffff;
            margin-top: 50px;
        }
        .botoes {
            margin: 20px 0;
        }
        button {
            padding: 15px 25px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: #000000;
            color: rgb(255, 255, 255);
            transition: 0.2s;
        }
        button:hover {
            background-color: #2300bd;
        }
        #resultado {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Pedra, Papel ou Tesoura</h1>
    <p>Escolha uma das opções abaixo:</p>

    <div class="botoes">
        <button onclick="jogar('pedra')">Pedra 🪨</button>
        <button onclick="jogar('papel')">Papel 📄</button>
        <button onclick="jogar('tesoura')">Tesoura ✂️</button>
    </div>

    <div id="resultado"></div>

    <script>
        function jogar(escolhaJogador) {
            const opcoes = ['pedra', 'papel', 'tesoura'];
            // Computador escolhe aleatoriamente
            const escolhaComputador = opcoes[Math.floor(Math.random() * 3)];

            let resultado = "";

            if (escolhaJogador === escolhaComputador) {
                resultado = `Empate! Ambos escolheram ${escolhaJogador}. 😐`;
            } else if (
                (escolhaJogador === 'pedra' && escolhaComputador === 'tesoura') ||
                (escolhaJogador === 'papel' && escolhaComputador === 'pedra') ||
                (escolhaJogador === 'tesoura' && escolhaComputador === 'papel')
            ) {
                resultado = `Você ganhou! ${escolhaJogador} vence ${escolhaComputador}. 🎉`;
            } else {
                resultado = `Você perdeu! ${escolhaComputador} vence ${escolhaJogador}. 😢`;
            }

            document.getElementById('resultado').innerHTML = `
                <p>Você: ${escolhaJogador}</p>
                <p>Computador: ${escolhaComputador}</p>
                <p>${resultado}</p>
            `;
        }

    
    </script>
</body>
</html>
